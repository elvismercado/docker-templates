version: "3.9"

x-base-env: &base-env # Unraid
  PUID: ${UID}
  PGID: ${GID}
  UMASK: ${UMASK}
  TZ: ${TZ}

services:
  recyclarr:
    image: recyclarr/recyclarr:latest
    container_name: media-recyclarr
    restart: always
    user: "${UID}:${GID}"
    networks:
      - media-net
    volumes:
      - ${APPDATA_BASE_PATH}/recyclarr/config:/config
    environment:
      <<: *base-env
      RECYCLARR_CREATE_CONFIG: false
    depends_on:
      - sonarr-series-hd
      - sonarr-series-anime-hd
      - radarr-movies-hd
      - radarr-movies-anime-hd