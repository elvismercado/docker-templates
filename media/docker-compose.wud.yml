# WUD (What's Up Docker?) labels for Media Stack

services:
  # Players — notify + auto-update minor/patch
  jellyfin:
    labels:
      - "wud.watch=true"
      - "wud.tag.include=^\\d+\\.\\d+\\.\\d+$$"
      - "wud.trigger.include=smtp.gmail,docker.local:minor"

