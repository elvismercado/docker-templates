# see https://docs.searxng.org/admin/settings/settings.html#settings-use-default-settings
use_default_settings:
  engines:
    keep_only:
      # Core search (own index)
      - google
      - google images
      - google videos
      - google news
      - google scholar
      - bing
      - bing images
      - bing videos
      - bing news
      - brave
      - brave.images
      - brave.videos
      - brave.news
      - mojeek
      - mojeek images
      - mojeek news
      # Knowledge/reference
      - wikipedia
      - wikidata
      - currency
      - mdn
      # Video/music
      - youtube
      - genius
      # IT/developer
      - github
      - stackoverflow
      - arch linux wiki
      - gitlab
      # Maps/weather
      - openstreetmap
      - openmeteo

# Enable engines that are disabled by default upstream
engines:
  - name: bing
    disabled: false
  - name: mojeek
    disabled: false
  - name: mojeek images
    disabled: false
  - name: mojeek news
    disabled: false
  - name: gitlab
    disabled: false
  - name: openmeteo
    disabled: false

general:
  debug: false
  instance_name: "SearXNG"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true

brand:
  issue_url: ""
  docs_url: ""
  public_instances: ""
  wiki_url: ""

search:
  safe_search: 0
  autocomplete: brave
  autocomplete_min: 4
  favicon_resolver: "duckduckgo"
  default_lang: all
  languages:
    - all
    - nl
    - en
    - es

server:
  secret_key: "ultrasecretkey"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

valkey:
  url: false

ui:
  static_use_hash: true
  results_on_new_tab: true
  theme_args:
    simple_style: dark

